{% extends "lostandfound/layout.html" %}

{% block body %}
<h2>Post an Item</h2>

<form action="{% url 'itempost' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label for="name">Item Name</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="description">Description</label><br>
    <textarea id="description" name="description" rows="4" cols="40" required></textarea><br><br>

    <label for="location">Location</label><br>
    <input type="text" id="location" name="location" required><br><br>

    <label for="status">Post Type</label><br>
    <select id="status" name="status" required>
        <option value="" selected disabled>Select type</option>
        <option value="lost">Lost Item</option>
        <option value="found">Found Item</option>
    </select><br><br>

    <label for="category">Category</label><br>
    <select id="category" name="category" required>
        <option value="" selected disabled>Select category</option>
        <option value="id_card">Student/Faculty ID Card</option>
        <option value="wallet">Wallet / Purse</option>
        <option value="keys">Keys</option>
        <option value="mobile_phone">Mobile Phone</option>
        <option value="laptop_tablet">Laptop / Tablet</option>
        <option value="charger_cables">Chargers / Cables</option>
        <option value="headphones">Headphones / Earbuds</option>
        <option value="calculator">Calculator</option>
        <option value="books_notes">Books / Notes</option>
        <option value="bag_backpack">Bag / Backpack</option>
        <option value="water_bottle">Water Bottle / Lunch Box</option>
        <option value="clothing">Clothing (Jacket, Hoodie, etc.)</option>
        <option value="sports_items">Sports Items</option>
        <option value="usb_storage">USB Drive / Storage Device</option>
        <option value="documents">Documents / Certificates</option>
        <option value="accessories">Accessories (Watch, Glasses, Jewelry)</option>
        <option value="lab_equipment">Lab Equipment</option>
        <option value="other">Other</option>
    </select><br><br>

    <label for="image">Item Image</label><br>
    <input type="file" id="image" name="image" accept="image/*" required><br><br>

    <button type="submit">Submit Post</button>
</form>
{% endblock %}
