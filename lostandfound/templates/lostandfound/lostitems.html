{% extends "lostandfound/layout.html" %}

{% block body %}
    {% for item in items %}
        <li>
            {{item}}
            {% if item.image %}
                <img src="{{item.image.url}}" alt="{{item.name}}">
            {% else %}
                <p>No image found</p> 
            {% endif %}
        </li>
    {% endfor %}

{% endblock %}
