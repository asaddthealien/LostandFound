{% extends "lostandfound/layout.html" %}

{% block body %}
	<h2>Claim Found Item</h2>
	<p class="muted">Provide details that prove the item belongs to you.</p>

	<form action="{% url 'claim' item_id %}" method="post" enctype="multipart/form-data">
		{% csrf_token %}

		<label for="proof">Proof of Ownership</label>
		<textarea id="proof" name="proof" rows="6" placeholder="Describe details only the actual owner would know." required></textarea>

		<label for="image">Supporting Image (Optional)</label>
		<input type="file" id="image" name="image" accept="image/*">

		<div class="actions">
			<button type="submit">Submit Claim</button>
			<a class="btn btn-secondary" href="{% url 'listitems' 'found' %}">Back</a>
		</div>
	</form>
{% endblock %}
